name: build
on: [push, pull_request, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: dotnet publish src/MediaNotesPro/MediaNotesPro.csproj -c Release -o artifacts/MediaNotesPro
      - run: cp meta.json artifacts/MediaNotesPro/
      - uses: actions/upload-artifact@v4
        with:
          name: MediaNotesPro
          path: artifacts/MediaNotesPro
